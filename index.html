    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  
        * { margin: 0; padding:E8E8;

            font-family: 'Cambria', serif;
            text-align: center;
            min-height: 100vh;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: none !important;
            overflow-y: auto;
            max-width: 520px;
            margin: 0 auto;
            user-select: none;
        }

        @media (hover: hover) and (min-width: 641px) {
            .custom-cursor {
                position: fixed; 
                width: 38px; 
                height: 38px; 
                pointer-events: none;
                z-index: 999999; 
                user-select: none; 
                opacity: 0; 
                transition: opacity 0.25s ease;
            }
            .custom-cursor.visible { opacity: 1; }
            .custom-cursor::after {
                content: '➤'; 
                font-size: 27px; 
                color: #1a1a1a;
                position: absolute; 
                top: 50%; 
                left: 50%;
                transform: translate(-50%, -50%) rotate(0deg);
                text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
            }
        }

        /* Hide custom cursor over interactive elements */
        .pfp, .thumb-wrapper, #play-btn, .progress-container, .links a, 
        .close-btn, .main-image {
            cursor: none !important;
        }

        .profile-section { margin-bottom: 24px; display: flex; flex-direction: column; align-items: center; }
        
        .pfp {
            width: 92px; 
            height: 92px; 
            border-radius: 50%; 
            object-fit: cover;
            margin-bottom: 14px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
            cursor: none !important;
        }
        .pfp:hover {
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            transform: scale(1.08);
        }
