        @media (hover: hover) and (min-width: 641px) {
            .custom-cursor {
                position: fixed; 
                width: 38px; 
                height: 38px; 
                pointer-events: none;
                z-index: 999999; 
                user-select: none; 
                opacity: 0; 
                transition: opacity 0.25s ease;
            }
            .custom-cursor.visible { opacity: 1; }
            .custom-cursor::after {
                content: '➤'; 
                font-size: 27px; 
                color: #1a1a1a;
                position: absolute; 
                top: 50%; 
                left: 50%;
                transform: translate(-50%, -50%) rotate(0deg);
                text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
            }
        }
